<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCEN Brain — Live Neural Activity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #c8d0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        canvas { display: block; }

        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #hud.hidden { display: none; }
        .hud-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #5ea4f5;
            margin-bottom: 8px;
        }
        .hud-stat {
            font-size: 12px;
            color: #7e8a9e;
            margin-bottom: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .hud-stat .val {
            color: #c8d0e0;
            font-weight: 500;
        }
        .hud-phase {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .hud-phase.infant { background: rgba(244,114,182,0.2); color: #f472b6; }
        .hud-phase.toddler { background: rgba(34,211,238,0.2); color: #22d3ee; }
        .hud-phase.juvenile { background: rgba(56,217,122,0.2); color: #38d97a; }
        .hud-phase.adolescent { background: rgba(245,166,35,0.2); color: #f5a623; }
        .hud-phase.mature { background: rgba(94,164,245,0.2); color: #5ea4f5; }

        /* Neuromodulator mini-bars */
        .neuromod-hud {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }
        .nm-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .nm-label {
            font-size: 9px;
            color: #7e8a9e;
            letter-spacing: 0.5px;
        }
        .nm-track {
            width: 4px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .nm-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            border-radius: 2px;
            transition: height 0.8s ease;
        }
        .nm-fill.da { background: #f5a623; }
        .nm-fill.ach { background: #22d3ee; }
        .nm-fill.ne { background: #f44; }
        .nm-fill.sht { background: #a78bfa; }

        /* Connection status toggle button */
        #connection-status {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 10px;
            z-index: 10;
            font-family: 'SF Mono', 'Fira Code', monospace;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #connection-status:hover {
            filter: brightness(1.3);
            border-color: rgba(255,255,255,0.15);
        }
        #connection-status .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        #connection-status.status-live {
            background: rgba(56,217,122,0.15);
            color: #38d97a;
        }
        #connection-status.status-live .status-dot { background: #38d97a; }
        #connection-status.status-simulated {
            background: rgba(245,166,35,0.15);
            color: #f5a623;
        }
        #connection-status.status-simulated .status-dot { background: #f5a623; }
        #connection-status.status-connecting {
            background: rgba(94,164,245,0.15);
            color: #5ea4f5;
        }
        #connection-status.status-connecting .status-dot { background: #5ea4f5; animation: pulse 1s infinite; }
        #connection-status.status-disconnected {
            background: rgba(244,63,63,0.15);
            color: #f44;
        }
        #connection-status.status-disconnected .status-dot { background: #f44; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Region labels */
        .region-label {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            font-size: 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: rgba(200, 208, 224, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(94, 164, 245, 0.1);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            transition: color 0.3s, background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .region-label:hover {
            color: #fff;
            background: rgba(10, 14, 26, 0.85);
            border-color: rgba(94, 164, 245, 0.4);
            box-shadow: 0 0 12px rgba(94, 164, 245, 0.2);
            z-index: 100;
        }
        .region-label.active {
            color: rgba(220, 228, 240, 0.95);
            background: rgba(10, 14, 26, 0.75);
            border-color: rgba(94, 164, 245, 0.25);
            text-shadow: 0 0 6px rgba(94, 164, 245, 0.4), 0 1px 3px rgba(0,0,0,0.8);
        }
        .region-label .rate {
            font-size: 8px;
            color: rgba(94, 164, 245, 0.7);
            margin-left: 4px;
            font-weight: 600;
        }

        /* Hover tooltip */
        .region-tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            padding: 12px 14px;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(94, 164, 245, 0.25);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 16px rgba(94, 164, 245, 0.1);
            pointer-events: none;
            z-index: 200;
            white-space: normal;
            text-transform: none;
            letter-spacing: 0;
        }
        .region-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(94, 164, 245, 0.25);
        }
        .region-tooltip.flipped::after {
            top: auto;
            bottom: 100%;
            border-top-color: transparent;
            border-bottom-color: rgba(94, 164, 245, 0.25);
        }
        .region-label:hover .region-tooltip {
            display: block;
        }
        .region-tooltip .tt-name {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .region-tooltip .tt-neurons {
            font-size: 10px;
            color: rgba(94, 164, 245, 0.8);
            margin-bottom: 6px;
        }
        .region-tooltip .tt-desc {
            font-size: 11px;
            color: rgba(200, 208, 224, 0.85);
            line-height: 1.5;
        }
        .region-tooltip .tt-connections {
            margin-top: 6px;
            font-size: 9px;
            color: rgba(200, 208, 224, 0.5);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-title">OSCEN Neural Activity</div>
        <div class="hud-stat">Neurons: <span class="val" id="hud-neurons">--</span></div>
        <div class="hud-stat">Synapses: <span class="val" id="hud-synapses">--</span></div>
        <div class="hud-stat">Step: <span class="val" id="hud-step">--</span></div>
        <div class="hud-stat">Rate: <span class="val" id="hud-rate">--</span> steps/sec</div>
        <div id="hud-phase-container">
            <span class="hud-phase juvenile" id="hud-phase">--</span>
        </div>
        <div class="neuromod-hud">
            <div class="nm-bar">
                <div class="nm-track"><div class="nm-fill da" id="nm-da" style="height:40%"></div></div>
                <span class="nm-label">DA</span>
            </div>
            <div class="nm-bar">
                <div class="nm-track"><div class="nm-fill ach" id="nm-ach" style="height:40%"></div></div>
                <span class="nm-label">ACh</span>
            </div>
            <div class="nm-bar">
                <div class="nm-track"><div class="nm-fill ne" id="nm-ne" style="height:40%"></div></div>
                <span class="nm-label">NE</span>
            </div>
            <div class="nm-bar">
                <div class="nm-track"><div class="nm-fill sht" id="nm-sht" style="height:40%"></div></div>
                <span class="nm-label">5HT</span>
            </div>
        </div>
    </div>

    <div id="connection-status" class="status-simulated" title="Click to toggle Live / Simulated">
        <span class="status-dot"></span>
        <span class="status-text">SIMULATED</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./lib/three.module.min.js",
            "three/addons/controls/OrbitControls.js": "./lib/OrbitControls.js",
            "three/addons/postprocessing/EffectComposer.js": "./lib/EffectComposer.js",
            "three/addons/postprocessing/RenderPass.js": "./lib/RenderPass.js",
            "three/addons/postprocessing/UnrealBloomPass.js": "./lib/UnrealBloomPass.js",
            "three/addons/postprocessing/ShaderPass.js": "./lib/ShaderPass.js",
            "three/addons/shaders/CopyShader.js": "./lib/CopyShader.js",
            "three/addons/shaders/LuminosityHighPassShader.js": "./lib/LuminosityHighPassShader.js"
        }
    }
    </script>

    <script type="module" src="./brain-scene.js?v=4"></script>
</body>
</html>
